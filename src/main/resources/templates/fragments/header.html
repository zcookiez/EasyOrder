<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <style th:fragment="header-styles">
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #f9fafb;
            --card-bg: #ffffff;
            --text-main: #111827;
            --text-sub: #6b7280;
            --border-color: #e5e7eb;
            --nav-bg: #ffffff;
        }

        .main-header {
            background-color: #ffffff;
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 2rem;
            display: flex;
            justify-content: flex-start; /* Pull to left */
            gap: 4rem; /* Gap between logo and search bar */
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-logo a {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-color);
            text-decoration: none;
            white-space: nowrap;
        }

        .header-search {
            flex: 0 1 400px;
        }

        .search-wrapper {
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 0.5rem 1rem 0.5rem 2.5rem;
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            background-color: #f3f4f6;
            font-size: 0.875rem;
            transition: all 0.2s;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary-color);
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .search-icon {
            position: absolute;
            left: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-sub);
        }

        .main-nav {
            background-color: var(--nav-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 0 2rem;
            display: flex;
            gap: 2rem;
        }

        .nav-item {
            padding: 1rem 0;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-sub);
            text-decoration: none;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            cursor: pointer;
        }

        .nav-item:hover, .nav-item.active {
            color: var(--primary-color);
            border-bottom-color: var(--primary-color);
        }

        .nav-item.disabled {
            cursor: default;
            opacity: 0.6;
        }
        
        .nav-item.disabled:hover {
            color: var(--text-sub);
            border-bottom-color: transparent;
        }

        /* Unified Pagination Styles */
        .pagination-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            padding: 1.5rem;
        }

        .pagination-info {
            font-size: 0.875rem;
            color: var(--text-sub);
        }

        .pagination-nav {
            display: flex;
            gap: 0.375rem;
        }

        .pagination-nav a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 1.25rem;
            height: 2.25rem;
            padding: 0 0.5rem;
            font-size: 0.875rem;
            font-weight: 500;
            border-radius: 0.5rem;
            text-decoration: none;
            transition: all 0.2s;
            border: 1px solid var(--border-color);
            background-color: white;
            color: var(--text-main);
        }

        .pagination-nav a:hover:not(.disabled) {
            border-color: var(--primary-color);
            color: var(--primary-color);
            background-color: #f5f3ff;
            transform: translateY(-1px);
        }

        .pagination-nav a.active {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
            box-shadow: 0 2px 4px rgba(79, 70, 229, 0.2);
        }

        .pagination-nav a.disabled {
            pointer-events: none;
            opacity: 0.4;
            background-color: #f3f4f6;
        }
    </style>
</head>
<body>

<header th:fragment="headerMain" class="main-header">
    <div class="header-logo">
        <a th:href="@{/products/gallery}">EasyOrder</a>
    </div>
    <div class="header-search">
        <div class="search-wrapper">
            <span class="search-icon">🔍</span>
            <input type="text" class="search-input" placeholder="상품 검색..." readonly>
        </div>
    </div>
</header>

<nav th:fragment="navMenu(activeMenu)" class="main-nav">
    <a th:href="@{/products/list}" class="nav-item" 
       th:classappend="${activeMenu == 'list' ? 'active' : ''}">상품관리</a>
    <span class="nav-item disabled">주문관리</span>
</nav>

</body>
</html>
