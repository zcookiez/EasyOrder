<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'EasyOrder | ' + ${product.name}">EasyOrder | 상품 상세</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style th:replace="~{fragments/header :: header-styles}"></style>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fff; color: var(--text-main); }
        .detail-container { max-width: 1040px; margin: 0 auto; padding: 3rem 2rem; }

        /* Top Section: Image + Primary Info */
        .detail-top { display: grid; grid-template-columns: 1.2fr 1fr; gap: 3rem; margin-bottom: 4rem; align-items: start; }
        
        .image-box { border-radius: 12px; overflow: hidden; background-color: #f3f3f3; border: 1px solid var(--border-color); position: sticky; top: 120px; }
        .main-img { width: 100%; height: auto; display: block; object-fit: cover; aspect-ratio: 1/1; }

        .info-box { display: flex; flex-direction: column; padding-top: 1rem; }
        .product-title { font-size: 2.25rem; font-weight: 700; margin-bottom: 1.5rem; line-height: 1.3; }
        .product-price-large { font-size: 2.5rem; font-weight: 700; color: var(--primary-color); margin-bottom: 2rem; }
        .product-price-large span { font-size: 1.25rem; color: var(--text-main); font-weight: 500; margin-left: 0.25rem; }

        .meta-list { list-style: none; padding: 0; margin-bottom: 2rem; border-top: 1px solid var(--border-color); }
        .meta-item { display: flex; justify-content: space-between; padding: 1.25rem 0; border-bottom: 1px solid var(--border-color); font-size: 1rem; }
        .meta-label { color: var(--text-sub); }
        .meta-value { font-weight: 600; }

        /* Middle Section: Description */
        .detail-middle { margin-bottom: 4rem; padding-top: 3rem; border-top: 1px solid var(--border-color); }
        .section-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 2rem; }
        .description-content { font-size: 1.125rem; line-height: 1.8; color: #4b5563; min-height: 300px; padding: 2rem; background-color: #f9fafb; border-radius: 12px; white-space: pre-wrap; }

        /* Bottom Section: Footer Info */
        .detail-bottom { background-color: #f9fafb; border-radius: 12px; padding: 2rem; border: 1px solid var(--border-color); }
        .footer-info { display: grid; grid-template-columns: repeat(2, 1fr); gap: 2rem; }
        .footer-item { font-size: 0.875rem; color: var(--text-sub); }
        .footer-item b { color: var(--text-main); margin-right: 0.5rem; }

        /* Responsive */
        @media (max-width: 768px) {
            .detail-top { grid-template-columns: 1fr; gap: 2rem; }
            .product-title { font-size: 1.75rem; }
            .product-price-large { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <div th:replace="~{fragments/header :: headerMain(showSearch=false)}"></div>
    <div th:replace="~{fragments/header :: navMenu(activeMenu='')}"></div>

    <div class="detail-container">
        <!-- Top Section -->
        <div class="detail-top">
            <div class="image-box">
                <img th:src="${product.imageUrl != null ? product.imageUrl : '/images/default/no-image.png'}" 
                     th:alt="${product.name}" class="main-img">
            </div>
            <div class="info-box">
                <h1 class="product-title" th:text="${product.name}">상품명</h1>
                <div class="product-price-large">
                    <th:block th:text="${#numbers.formatInteger(product.price, 0, 'COMMA')}"></th:block>
                    <span>원</span>
                </div>
                
                <ul class="meta-list">
                    <li class="meta-item">
                        <span class="meta-label">남은 수량</span>
                        <span class="meta-value" th:text="${product.stock} + '개'">0개</span>
                    </li>
                    <li class="meta-item">
                        <span class="meta-label">판매 상태</span>
                        <span class="meta-value" th:if="${!product.deleteYn}" style="color: #059669;">판매중</span>
                        <span class="meta-value" th:if="${product.deleteYn}" style="color: #6b7280;">판매중지</span>
                    </li>
                </ul>

                <div style="margin-top: auto;">
                    <a th:href="@{/products/edit/{id}(id=${product.productId}, page=${currentPage}, search=${(search != null && !search.isEmpty()) ? search : ''})}" 
                       style="display: block; width: 100%; padding: 1rem; background-color: var(--primary-color); color: #fff; text-align: center; text-decoration: none; border-radius: 8px; font-weight: 600;">
                        상품 정보 수정하기
                    </a>
                </div>
            </div>
        </div>

        <!-- Middle Section -->
        <div class="detail-middle">
            <h2 class="section-title">상품 상세 설명</h2>
            <div class="description-content" th:text="${product.description != null ? product.description : '상품 상세 설명 준비중입니다.'}"></div>
        </div>

        <!-- Bottom Section -->
        <div class="detail-bottom">
            <div class="footer-info">
                <div class="footer-item">
                    <b>상품 고유 ID</b>
                    <span th:text="${product.productId}"></span>
                </div>
                <div class="footer-item">
                    <b>상품 등록일</b>
                    <span th:text="${product.createdAt != null ? #temporals.format(product.createdAt, 'yyyy-MM-dd HH:mm') : '-'}"></span>
                </div>
            </div>
        </div>
        
        <div style="margin-top: 3rem; text-align: center;">
            <a th:href="@{/products/list(page=${currentPage}, search=${(search != null && !search.isEmpty()) ? search : ''})}" style="color: var(--text-sub); text-decoration: none; font-size: 0.875rem;">목록으로 돌아가기</a>
        </div>
    </div>

</body>
</html>
