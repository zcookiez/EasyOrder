<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyOrder | 상품 갤러리</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style th:replace="~{fragments/header :: header-styles}"></style>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-color); color: var(--text-main); }
        .container { max-width: 1200px; margin: 2rem auto; padding: 0 2rem; }
        .page-header { margin-bottom: 3rem; text-align: center; }
        .page-header h1 { font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; }
        .page-header p { color: var(--text-sub); }

        .gallery-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; }
        .product-card { background: #fff; border: 1px solid var(--border-color); border-radius: 8px; overflow: hidden; transition: all 0.3s ease; cursor: pointer; display: flex; flex-direction: column; }
        .product-card:hover { transform: translateY(-8px); box-shadow: 0 10px 20px rgba(0,0,0,0.08); }
        .card-img-wrapper { width: 100%; aspect-ratio: 4 / 3; overflow: hidden; background-color: #f3f3f3; }
        .card-img { width: 100%; height: 100%; object-fit: cover; }
        .card-content { padding: 1.25rem; flex-grow: 1; }
        .product-name { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.75rem; }
        .price { font-size: 1.25rem; font-weight: 700; color: var(--primary-color); }
    </style>
</head>
<body>

    <div th:replace="~{fragments/header :: headerMain}"></div>
    <div th:replace="~{fragments/header :: navMenu(activeMenu='gallery')}"></div>

    <div class="container">
        <header class="page-header">
            <h1>전체 상품</h1>
            <p>EasyOrder의 다양한 상품들을 만나보세요.</p>
        </header>

        <main>
            <div class="gallery-grid">
                <div class="product-card" th:each="product : ${products.content}"
                     th:onclick="|location.href='/products/gallery/${product.productId}'|">
                    <div class="card-img-wrapper">
                        <img th:src="${product.imageUrl != null ? product.imageUrl : '/images/default/no-image.png'}" class="card-img">
                    </div>
                    <div class="card-content">
                        <h3 class="product-name" th:text="${product.name}"></h3>
                        <div class="price" th:text="${#numbers.formatInteger(product.price, 0, 'COMMA')} + '원'"></div>
                    </div>
                </div>
            </div>

            <div class="pagination-container" th:if="${products.totalPages > 0}">
                <nav class="pagination-nav">
                    <a th:href="${products.currentPage > 0 ? '/products/gallery?page=' + (products.currentPage - 1) : 'javascript:void(0)'}" th:classappend="${products.currentPage == 0} ? 'disabled' : ''">&lt;</a>
                    <a th:each="i : ${#numbers.sequence(0, products.totalPages - 1)}" th:href="@{/products/gallery(page=${i})}" th:text="${i + 1}" th:classappend="${i == products.currentPage} ? 'active' : ''"></a>
                    <a th:href="${products.currentPage < products.totalPages - 1 ? '/products/gallery?page=' + (products.currentPage + 1) : 'javascript:void(0)'}" th:classappend="${products.currentPage >= products.totalPages - 1} ? 'disabled' : ''">&gt;</a>
                </nav>
            </div>
        </main>
    </div>
</body>
</html>
