<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'EasyOrder | ' + ${product.name}">EasyOrder | 상품 상세</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style th:replace="~{fragments/header :: header-styles}"></style>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fff; color: var(--text-main); }
        .detail-container { max-width: 1040px; margin: 0 auto; padding: 3rem 2rem; }

        /* Top Section: Image + Info Card (Tumblbug Style) */
        .detail-top { display: grid; grid-template-columns: 1.2fr 1fr; gap: 3rem; margin-bottom: 4rem; align-items: start; }
        
        .image-box { border-radius: 12px; overflow: hidden; background-color: #f3f3f3; border: 1px solid var(--border-color); position: sticky; top: 120px; }
        .main-img { width: 100%; height: auto; display: block; object-fit: cover; aspect-ratio: 1/1; }

        .info-card { background: #fff; border: 1px solid var(--border-color); border-radius: 12px; padding: 2rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .product-title { font-size: 1.75rem; font-weight: 700; margin-bottom: 1rem; line-height: 1.3; }
        .product-price-large { font-size: 2rem; font-weight: 700; color: var(--primary-color); margin-bottom: 1.5rem; }
        .product-price-large span { font-size: 1.125rem; color: var(--text-main); font-weight: 500; margin-left: 0.25rem; }

        .meta-list { list-style: none; padding: 0; margin-bottom: 2rem; border-top: 1px solid var(--border-color); }
        .meta-item { display: flex; justify-content: space-between; padding: 1rem 0; border-bottom: 1px solid var(--border-color); font-size: 0.95rem; }
        .meta-label { color: var(--text-sub); }
        .meta-value { font-weight: 600; }

        /* Quantity Selector UI */
        .order-section { margin-top: 2rem; padding-top: 2rem; border-top: 2px solid var(--border-color); }
        .quantity-label { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; display: block; }
        .quantity-control { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1.5rem; }
        .qty-btn { width: 36px; height: 36px; border: 1px solid var(--border-color); background: #fff; border-radius: 4px; cursor: pointer; font-size: 1.25rem; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .qty-btn:hover { background: #f9fafb; border-color: var(--primary-color); color: var(--primary-color); }
        .qty-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .qty-input {
            width: 40px;
            height: 36px; 
            text-align: center; 
            border: 1px solid var(--border-color); 
            border-radius: 4px; 
            font-size: 1rem; 
            font-weight: 600; 
            outline: none;
            padding: 0;
            -moz-appearance: textfield; /* Firefox 화살표 제거 */
        }
        .qty-input::-webkit-outer-spin-button,
        .qty-input::-webkit-inner-spin-button {
            -webkit-appearance: none; /* Chrome, Safari 화살표 제거 */
            margin: 0;
        }
        
        /* Real-time Total Price */
        .total-price-box { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; padding: 1.25rem; background: #f5f3ff; border-radius: 8px; }
        .total-label { font-weight: 600; color: var(--text-sub); }
        .total-amount { font-size: 1.5rem; font-weight: 700; color: var(--primary-color); }

        /* Purchase Button */
        .buy-btn { display: block; width: 100%; padding: 1.25rem; background-color: var(--primary-color); color: #fff; text-align: center; text-decoration: none; border: none; border-radius: 8px; font-size: 1.125rem; font-weight: 700; cursor: pointer; transition: all 0.2s; }
        .buy-btn:hover { background-color: var(--primary-hover); transform: translateY(-2px); }
        .buy-btn:disabled { background-color: #d1d5db; cursor: not-allowed; transform: none; }

        .sold-out-badge { display: inline-block; padding: 0.25rem 0.75rem; background: #fee2e2; color: #ef4444; border-radius: 4px; font-size: 0.875rem; font-weight: 600; margin-bottom: 1rem; }

        /* Middle Section: Description */
        .detail-middle { margin-top: 4rem; padding-top: 3rem; border-top: 1px solid var(--border-color); }
        .section-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 2rem; }
        .description-content { font-size: 1.125rem; line-height: 1.8; color: #4b5563; min-height: 200px; padding: 2rem; background-color: #f9fafb; border-radius: 12px; white-space: pre-wrap; }

        /* Responsive */
        @media (max-width: 820px) {
            .detail-top { grid-template-columns: 1fr; gap: 2rem; }
            .image-box { position: static; }
        }
    </style>
</head>
<body>

    <div th:replace="~{fragments/header :: headerMain(showSearch=false)}"></div>
    <div th:replace="~{fragments/header :: navMenu(activeMenu='gallery')}"></div>

    <div class="detail-container">
        <!-- Top Section -->
        <div class="detail-top">
            <div class="image-box">
                <img th:src="${(product.imageUrl != null && !#strings.isEmpty(product.imageUrl)) ? product.imageUrl : '/images/default/no-image.png'}" 
                     th:alt="${product.name}" class="main-img">
            </div>
            
            <div class="info-card">
                <div th:if="${product.stock <= 0}" class="sold-out-badge">품절</div>
                <h1 class="product-title" th:text="${product.name}">상품명</h1>
                <div class="product-price-large">
                    <th:block th:text="${#numbers.formatInteger(product.price, 0, 'COMMA')}"></th:block>
                    <span>원</span>
                </div>
                
                <ul class="meta-list">
                    <li class="meta-item">
                        <span class="meta-label">남은 수량</span>
                        <span class="meta-value" th:text="${product.stock} + '개'">0개</span>
                    </li>
                </ul>

                <div class="order-section" th:if="${product.stock > 0}">
                    <form th:action="@{/orders}" method="post">
                        <input type="hidden" name="productId" th:value="${product.productId}">
                        <input type="hidden" name="price" th:value="${product.price}">
                        <input type="hidden" name="page" th:value="${currentPage}">
                        <input type="hidden" name="search" th:value="${search}">
                        
                        <label class="quantity-label">주문 수량</label>
                        <div class="quantity-control">
                            <button type="button" class="qty-btn" id="minusBtn" onclick="changeQty(-1)">-</button>
                            <input type="number" name="orderQuantity" id="quantity" class="qty-input" value="1" min="1" th:max="${product.stock}" readonly>
                            <button type="button" class="qty-btn" id="plusBtn" onclick="changeQty(1)">+</button>
                        </div>

                        <div class="total-price-box">
                            <span class="total-label">총 결제 금액</span>
                            <span class="total-amount" id="totalPriceDisplay" 
                                  th:data-unit-price="${product.price}"
                                  th:text="${#numbers.formatInteger(product.price, 0, 'COMMA')} + '원'"></span>
                        </div>

                        <button type="submit" class="buy-btn">
                            구매하기
                        </button>
                    </form>
                </div>

                <div class="order-section" th:if="${product.stock <= 0}">
                    <button class="buy-btn" disabled>
                        품절된 상품입니다
                    </button>
                </div>
            </div>
        </div>

        <!-- Middle Section -->
        <div class="detail-middle">
            <h2 class="section-title">상품 상세 정보</h2>
            <div class="description-content" th:text="${product.description != null ? product.description : '상품 상세 설명 준비중입니다.'}"></div>
        </div>
        
        <div style="margin-top: 3rem; text-align: center;">
            <a th:href="@{/products/gallery(page=${currentPage}, search=${search})}" style="color: var(--text-sub); text-decoration: none; font-size: 0.875rem;">갤러리로 돌아가기</a>
        </div>
    </div>

    <script th:inline="javascript">
        /* 구매 완료 알림창 */
        const message = [[${message}]];
        if (message) {
            alert(message);
        }

        const maxStock = [[${product.stock}]];
        const unitPrice = [[${product.price}]];
        const qtyInput = document.getElementById('quantity');
        const totalPriceDisplay = document.getElementById('totalPriceDisplay');
        const minusBtn = document.getElementById('minusBtn');
        const plusBtn = document.getElementById('plusBtn');

        function changeQty(delta) {
            let currentQty = parseInt(qtyInput.value);
            let newQty = currentQty + delta;

            if (newQty < 1) newQty = 1;
            if (newQty > maxStock) newQty = maxStock;

            qtyInput.value = newQty;
            updateUI(newQty);
        }

        function updateUI(qty) {
            // 버튼 상태 업데이트
            minusBtn.disabled = (qty <= 1);
            plusBtn.disabled = (qty >= maxStock);

            // 금액 업데이트
            const total = qty * unitPrice;
            totalPriceDisplay.innerText = total.toLocaleString() + '원';
        }

        // 초기 실행
        if(qtyInput) {
            updateUI(parseInt(qtyInput.value));
        }
    </script>
</body>
</html>
